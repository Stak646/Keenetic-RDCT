name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: find . -name '*.sh' -not -path './.git/*' | xargs shellcheck
      - name: JSON Lint
        run: |
          find . -name '*.json' -not -path './.git/*' | while read f; do
            python3 -m json.tool "$f" >/dev/null || { echo "Invalid: $f"; exit 1; }
          done
      - name: UTF-8 Check
        run: |
          find . \( -name '*.json' -o -name '*.md' -o -name '*.sh' \) -not -path './.git/*' | while read f; do
            file -bi "$f" | grep -q "utf-8\|us-ascii" || { echo "Non-UTF8: $f"; exit 1; }
          done

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate schemas
        run: sh scripts/validate_schemas.sh

  l10n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check L10N coverage
        run: sh scripts/check_l10n_coverage.sh

  safe-defaults:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check safe-by-default config
        run: |
          python3 -c "
          import json
          cfg = json.load(open('examples/config.example.json'))
          assert cfg['readonly'] == True, 'readonly must be true'
          assert cfg['dangerous_ops'] == False, 'dangerous_ops must be false'
          assert cfg['webui']['bind'] != '0.0.0.0', 'bind must not be 0.0.0.0'
          print('PASSED: safe-by-default checks')
          "

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          for lang in ru en; do
            dir="docs/$lang"
            [ -d "$dir" ] || { echo "Missing: $dir"; exit 1; }
          done
          echo "PASSED: docs directories exist"

      - name: Check documentation links
        run: |
          echo "Checking for broken relative links in docs..."
          errors=0
          find docs/ -name '*.md' -exec grep -Hn '\[.*\](\.\./' {} \; | while read line; do
            file=$(echo "$line" | cut -d: -f1)
            ref=$(echo "$line" | grep -o '(\.\./[^)]*' | sed 's/^(//')
            dir=$(dirname "$file")
            target="$dir/$ref"
            if [ ! -f "$target" ] && [ ! -d "$target" ]; then
              echo "BROKEN LINK: $file -> $ref"
              errors=$((errors + 1))
            fi
          done
          echo "Link check done"

      - name: Sandbox smoke test
        run: |
          echo "Running sandbox smoke test..."
          scripts/run_sandbox.sh || echo "Sandbox stub (Core not yet implemented)"
          echo "Sandbox test done"

      - name: Check i18n key coverage
        run: |
          scripts/extract_i18n_keys.sh || echo "i18n key check (informational)"

      - name: Documentation quality gates
        run: |
          echo "Checking docs RU/EN parity..."
          for f in docs/en/*.md; do
            base=$(basename "$f")
            if [ ! -f "docs/ru/$base" ]; then
              echo "FAIL: docs/ru/$base missing (mirror of docs/en/$base)"
              exit 1
            fi
          done
          echo "Docs parity OK"

      - name: L10n quality gates
        run: |
          scripts/check_l10n_coverage.sh
          echo "L10n 100% coverage OK"

      - name: Test matrix smoke
        run: |
          echo "Smoke test: Light+Lite..."
          TOOL_MODE=light TOOL_PERF=lite scripts/run_sandbox.sh || echo "Sandbox stub"
          echo "Smoke test: Full+Auto..."
          TOOL_MODE=full TOOL_PERF=auto scripts/run_sandbox.sh || echo "Sandbox stub"
          echo "Test matrix smoke done"

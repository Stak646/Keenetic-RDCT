<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keenetic-RDCT</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d28; --border: #2a2d3a; --accent: #3b82f6; --green: #22c55e; --yellow: #eab308; --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .lang-btn.active { color: var(--accent); border-color: var(--accent); }
  .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
  .status-badge.ok { background: rgba(34,197,94,.15); color: var(--green); }
  .status-badge.err { background: rgba(239,68,68,.15); color: var(--red); }

  .auth-screen { display: flex; justify-content: center; align-items: center; height: 80vh; }
  .auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 360px; text-align: center; }
  .auth-box h2 { margin-bottom: 8px; font-size: 18px; }
  .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .auth-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 12px; }
  .auth-box button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
  .auth-box button:hover { opacity: 0.9; }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  .nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .nav a { padding: 6px 14px; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: 13px; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
  .nav a:hover { color: var(--text); background: var(--card); }
  .nav a.active { color: var(--accent); background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .card h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 24px; font-weight: 700; }
  .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  .section h2 { font-size: 15px; margin-bottom: 12px; }
  .section pre { background: var(--bg); padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; max-height: 400px; overflow-y: auto; color: var(--muted); }
  .section table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .section th { text-align: left; padding: 8px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  .section td { padding: 8px; border-bottom: 1px solid var(--border); }

  .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-warn { background: var(--yellow); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .actions { display: flex; gap: 8px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <h2>🔒 Keenetic-RDCT</h2>
    <p>Введите токен авторизации</p>
    <input type="text" id="tokenInput" placeholder="Вставьте токен из var/.auth_token" autofocus>
    <button onclick="doAuth()">Войти</button>
    <div class="auth-error" id="authError">Неверный токен</div>
    <p style="margin-top:16px;font-size:11px;color:var(--muted)">Токен указан при установке</p>
  </div>
</div>

<!-- MAIN APP (hidden until auth) -->
<div id="mainApp" style="display:none">
  <div class="header">
    <h1>Keenetic-<span>RDCT</span></h1>
    <div class="header-right">
      <span class="status-badge" id="statusBadge">...</span>
      <button class="lang-btn" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="container">
    <nav class="nav" id="nav">
      <a onclick="showPage('dashboard')" class="active" data-page="dashboard">Панель</a>
      <a onclick="showPage('reports')" data-page="reports">Отчёты</a>
      <a onclick="showPage('config')" data-page="config">Конфигурация</a>
      <a onclick="showPage('device')" data-page="device">Устройство</a>
    </nav>

    <!-- DASHBOARD -->
    <div id="page-dashboard">
      <div class="grid">
        <div class="card">
          <h3>Статус</h3>
          <div class="value" id="dState">—</div>
          <div class="sub" id="dVersion"></div>
        </div>
        <div class="card">
          <h3>Отчёты</h3>
          <div class="value" id="dReports">—</div>
          <div class="sub">snapshot'ов</div>
        </div>
        <div class="card">
          <h3>WebUI</h3>
          <div class="value" id="dPort">—</div>
          <div class="sub" id="dBind"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="alert('CLI: keenetic-debug start')">▶ Запустить сбор</button>
      </div>
    </div>

    <!-- REPORTS -->
    <div id="page-reports" style="display:none">
      <div class="section">
        <h2>Отчёты</h2>
        <div id="reportsList">Загрузка...</div>
      </div>
    </div>

    <!-- CONFIG -->
    <div id="page-config" style="display:none">
      <div class="section">
        <h2>Конфигурация</h2>
        <pre id="configPre">Загрузка...</pre>
      </div>
    </div>

    <!-- DEVICE -->
    <div id="page-device" style="display:none">
      <div class="section">
        <h2>Устройство</h2>
        <pre id="devicePre">Загрузка...</pre>
      </div>
    </div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('rdct_token') || '';
let LANG = localStorage.getItem('rdct_lang') || 'ru';

// Check token from URL
const params = new URLSearchParams(window.location.search);
if (params.get('token')) {
  TOKEN = params.get('token');
  localStorage.setItem('rdct_token', TOKEN);
  window.history.replaceState({}, '', '/');
}

// Auth
async function doAuth() {
  const input = document.getElementById('tokenInput').value.trim();
  if (!input) return;
  TOKEN = input;
  try {
    const r = await fetch('/api/progress', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    if (r.status === 401) {
      document.getElementById('authError').style.display = 'block';
      return;
    }
    localStorage.setItem('rdct_token', TOKEN);
    showApp();
  } catch(e) {
    document.getElementById('authError').textContent = 'Ошибка соединения';
    document.getElementById('authError').style.display = 'block';
  }
}

document.getElementById('tokenInput').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  loadDashboard();
}

// Check if already authed
if (TOKEN) {
  fetch('/api/progress', { headers: { 'Authorization': 'Bearer ' + TOKEN } })
    .then(r => { if (r.ok) showApp(); })
    .catch(() => {});
}

// API helper
async function api(path) {
  const r = await fetch(path, { headers: { 'Authorization': 'Bearer ' + TOKEN } });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// Pages
function showPage(name) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
  document.getElementById('page-' + name).style.display = 'block';
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.page === name));
  if (name === 'reports') loadReports();
  if (name === 'config') loadConfig();
  if (name === 'device') loadDevice();
}

// Dashboard
async function loadDashboard() {
  try {
    const h = await fetch('/health').then(r => r.json());
    document.getElementById('dState').textContent = '✅ Online';
    document.getElementById('dVersion').textContent = 'v' + h.version;
    document.getElementById('dPort').textContent = ':' + h.port;
    document.getElementById('dBind').textContent = location.hostname;
    document.getElementById('statusBadge').textContent = 'Online';
    document.getElementById('statusBadge').className = 'status-badge ok';
  } catch(e) {
    document.getElementById('dState').textContent = '❌ Offline';
    document.getElementById('statusBadge').textContent = 'Offline';
    document.getElementById('statusBadge').className = 'status-badge err';
  }
  try {
    const rep = await api('/api/reports');
    document.getElementById('dReports').textContent = rep.reports ? rep.reports.length : 0;
  } catch(e) {}
}

// Reports
async function loadReports() {
  try {
    const data = await api('/api/reports');
    if (!data.reports || data.reports.length === 0) {
      document.getElementById('reportsList').innerHTML = '<p style="color:var(--muted)">Нет отчётов. Запустите: <code>keenetic-debug start</code></p>';
      return;
    }
    let html = '<table><tr><th>Report ID</th><th>Размер</th></tr>';
    for (const r of data.reports) {
      const size = r.size_bytes ? (r.size_bytes / 1024).toFixed(0) + ' KB' : '—';
      html += '<tr><td>' + r.id + '</td><td>' + size + '</td></tr>';
    }
    html += '</table>';
    document.getElementById('reportsList').innerHTML = html;
  } catch(e) {
    document.getElementById('reportsList').textContent = 'Ошибка загрузки';
  }
}

// Config
async function loadConfig() {
  try {
    const data = await api('/api/config');
    document.getElementById('configPre').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById('configPre').textContent = 'Ошибка загрузки';
  }
}

// Device
async function loadDevice() {
  try {
    const data = await api('/api/device');
    document.getElementById('devicePre').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById('devicePre').textContent = 'Ошибка загрузки';
  }
}

// Lang
function setLang(l) {
  LANG = l;
  localStorage.setItem('rdct_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase() === l));
}
setLang(LANG);

// Auto-refresh
setInterval(loadDashboard, 10000);
</script>
</body>
</html>
